name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish or refresh, for example v0.1.0
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: rotranslator-linux-x86_64
            binary_path: dist/rotranslator
          # GitHub does not provide a generic Intel "latest" macOS label.
          # Use the current latest supported Intel runner explicitly.
          - os: macos-15-intel
            asset_name: rotranslator-macos-x86_64
            binary_path: dist/rotranslator
          - os: macos-latest
            asset_name: rotranslator-macos-aarch64
            binary_path: dist/rotranslator
          - os: windows-latest
            asset_name: rotranslator-windows-x86_64.exe
            binary_path: dist/rotranslator.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller .

      - name: Build binary
        run: python scripts/build_binary.py

      - name: Rename asset
        shell: python
        run: |
          from pathlib import Path
          source = Path(r"${{ matrix.binary_path }}")
          target = Path("dist") / r"${{ matrix.asset_name }}"
          source.replace(target)

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          overwrite: true

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: artifacts/*
          overwrite_files: true
          fail_on_unmatched_files: true
