name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish or refresh, for example v0.1.0
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_os: linux
            asset_arch: x86_64
            binary_name: rotranslator
          - os: macos-15-intel
            asset_os: macos
            asset_arch: x86_64
            binary_name: rotranslator
          - os: macos-latest
            asset_os: macos
            asset_arch: aarch64
            binary_name: rotranslator
          - os: windows-latest
            asset_os: windows
            asset_arch: x86_64
            binary_name: rotranslator.exe

    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller .

      - name: Build binary
        run: python scripts/build_binary.py

      - name: Package release asset
        shell: python
        run: |
          import stat
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          binary_name = Path(r"${{ matrix.binary_name }}")
          binary_path = dist / binary_name
          release_tag = "${{ env.RELEASE_TAG }}"
          version = release_tag[1:] if release_tag.startswith("v") else release_tag
          archive_name = f"rotranslator-{version}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.zip"
          archive_path = dist / archive_name

          archive_mode = "w"
          with zipfile.ZipFile(archive_path, archive_mode, compression=zipfile.ZIP_DEFLATED) as archive:
              info = zipfile.ZipInfo(binary_name.name)
              info.compress_type = zipfile.ZIP_DEFLATED
              if binary_name.suffix == ".exe":
                  info.external_attr = (0o644 & 0xFFFF) << 16
              else:
                  # Preserve executable permissions when Rokit extracts the archive.
                  info.external_attr = ((stat.S_IFREG | 0o755) & 0xFFFF) << 16
              archive.writestr(info, binary_path.read_bytes())

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: rotranslator-${{ env.RELEASE_TAG }}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.zip
          path: dist/rotranslator-*.zip
          overwrite: true

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: artifacts/*
          overwrite_files: true
          fail_on_unmatched_files: true
